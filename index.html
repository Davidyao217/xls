<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fafafa;font-family:Inter,sans-serif;font-size:13px;color:#1a1a1a}
body{display:flex;flex-direction:column}
#toolbar{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fff;border-bottom:1px solid #e0e0e0;flex-shrink:0}
#cell-name{width:48px;padding:3px 6px;border:1px solid #d0d0d0;border-radius:3px;font:inherit;font-size:12px;text-align:center;background:#f5f5f5;color:#555;outline:none}
#formula-bar{flex:1;padding:3px 8px;border:1px solid #d0d0d0;border-radius:3px;font:inherit;font-size:13px;font-family:ui-monospace,monospace;outline:none}
#formula-bar:focus{border-color:#4f8ef7;box-shadow:0 0 0 2px rgba(79,142,247,.15)}
#export-btn{padding:4px 12px;background:#fff;border:1px solid #d0d0d0;border-radius:3px;font:inherit;font-size:12px;cursor:pointer;color:#444;white-space:nowrap}
#export-btn:hover{background:#f0f0f0}
#grid-wrap{overflow:auto;flex:1;outline:none}
table{border-collapse:collapse;table-layout:fixed}
col.row-hdr{width:36px}
col.col-c{width:90px}
th,td{border-right:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0}
th.corner{border:none;background:#f5f5f5}
th.col-hdr{background:#f5f5f5;text-align:center;font-weight:500;font-size:11px;color:#888;padding:3px 0;user-select:none;border-top:1px solid #e0e0e0;border-left:1px solid #e0e0e0}
th.col-hdr:first-child{border-left:none}
td.row-hdr{background:#f5f5f5;text-align:right;padding:0 6px 0 0;font-size:11px;color:#aaa;user-select:none;border-left:1px solid #e0e0e0}
td.cell{padding:0;position:relative;font-family:ui-monospace,monospace}
td.cell.selected{box-shadow:inset 0 0 0 2px #4f8ef7;z-index:1}
td.cell span{display:block;padding:2px 5px;min-height:22px;line-height:18px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:default}
td.cell span.error{color:#d32f2f}
td.cell span.num{text-align:right}
td.cell input.edit{position:absolute;inset:0;width:100%;height:100%;padding:2px 5px;border:none;outline:none;font:inherit;font-family:ui-monospace,monospace;font-size:13px;background:#fff;z-index:3}
</style>
</head>
<body>
<div id="toolbar">
  <input id="cell-name" readonly>
  <input id="formula-bar" autocomplete="off" spellcheck="false">
  <button id="export-btn">Export CSV</button>
</div>
<div id="grid-wrap" tabindex="0">
<table id="grid"><colgroup id="cg"></colgroup><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>
<script>
(function(){
'use strict';
const ROWS=20,COLS=10;
const LETTERS='ABCDEFGHIJ';

/* ─── state ─── */
const data={};      // cellKey -> raw string
const computed={};  // cellKey -> number|string (or "#ERR" etc.)
let selR=0,selC=0;
let editing=false;
let editEl=null;    // the <input> inside the cell when editing

/* ─── build grid ─── */
const cg=document.getElementById('cg');
const thead=document.getElementById('thead');
const tbody=document.getElementById('tbody');
const cells=[];

// colgroup
let col=document.createElement('col');col.className='row-hdr';cg.appendChild(col);
for(let c=0;c<COLS;c++){col=document.createElement('col');col.className='col-c';cg.appendChild(col);}

// header row
{const tr=document.createElement('tr');
const th0=document.createElement('th');th0.className='corner';tr.appendChild(th0);
for(let c=0;c<COLS;c++){const th=document.createElement('th');th.className='col-hdr';th.textContent=LETTERS[c];tr.appendChild(th);}
thead.appendChild(tr);}

// data rows
for(let r=0;r<ROWS;r++){
  cells[r]=[];
  const tr=document.createElement('tr');
  const rh=document.createElement('td');rh.className='row-hdr';rh.textContent=r+1;tr.appendChild(rh);
  for(let c=0;c<COLS;c++){
    const td=document.createElement('td');td.className='cell';td.dataset.r=r;td.dataset.c=c;
    const sp=document.createElement('span');td.appendChild(sp);tr.appendChild(td);cells[r][c]=td;
  }
  tbody.appendChild(tr);
}

/* ─── helpers ─── */
function ckey(r,c){return LETTERS[c]+(r+1);}
function parseRef(s){
  const m=/^([A-J])(\d+)$/i.exec(s);if(!m)return null;
  const c=LETTERS.indexOf(m[1].toUpperCase()),r=+m[2]-1;
  return(c>=0&&r>=0&&r<ROWS&&c<COLS)?[r,c]:null;
}
function parseRange(s){
  const m=/^([A-J]\d+):([A-J]\d+)$/i.exec(s);if(!m)return null;
  const a=parseRef(m[1]),b=parseRef(m[2]);return(a&&b)?[a,b]:null;
}

/* ─── formula engine ─── */
function evalCell(k,stk){
  if(stk&&stk.has(k))return{err:'#CIRC'};
  const raw=(data[k]||'').trim();
  if(!raw)return{val:''};
  if(raw[0]!=='='){const n=Number(raw);return{val:isNaN(n)?raw:n};}
  const s=new Set(stk||[]);s.add(k);
  try{return{val:evalExpr(raw.slice(1),s)};}
  catch(e){return{err:e.message||'#ERR'};}
}

function evalExpr(expr,stk){
  const tok=tokenize(expr);
  const p={i:0};
  const v=parseAS(tok,p,stk);
  if(p.i<tok.length)throw new Error('#ERR');
  return v;
}

function tokenize(s){
  const re=/\s*(\d+(?:\.\d*)?(?:[eE][+-]?\d+)?|[A-J]\d+:[A-J]\d+|[A-J]\d+|[A-Za-z]+|[+\-*/(),])\s*/gi;
  const out=[];let m;while((m=re.exec(s))!==null)out.push(m[1]);return out;
}

function parseAS(tok,p,stk){
  let v=parseMD(tok,p,stk);
  for(;;){const op=tok[p.i];if(op!=='+'&&op!=='-')break;p.i++;const r=parseMD(tok,p,stk);v=op==='+'?v+r:v-r;}
  return v;
}

function parseMD(tok,p,stk){
  let v=parseUnary(tok,p,stk);
  for(;;){const op=tok[p.i];if(op!=='*'&&op!=='/')break;p.i++;const r=parseUnary(tok,p,stk);
    if(op==='/'&&r===0)throw new Error('#DIV/0');v=op==='*'?v*r:v/r;}
  return v;
}

function parseUnary(tok,p,stk){
  if(tok[p.i]==='-'){p.i++;return -parseAtom(tok,p,stk);}
  if(tok[p.i]==='+'){p.i++;return parseAtom(tok,p,stk);}
  return parseAtom(tok,p,stk);
}

function parseAtom(tok,p,stk){
  const t=tok[p.i];
  if(t===undefined)throw new Error('#ERR');
  if(t==='('){p.i++;const v=parseAS(tok,p,stk);if(tok[p.i]!==')')throw new Error('#ERR');p.i++;return v;}
  if(/^\d/.test(t)){p.i++;return parseFloat(t);}
  // function call
  if(/^[A-Za-z]+$/.test(t)&&tok[p.i+1]==='('){
    const fn=tok[p.i].toUpperCase();p.i+=2;
    const args=[];
    while(tok[p.i]!==')'){
      if(tok[p.i]===','){p.i++;continue;}
      args.push(parseAS(tok,p,stk));
    }
    p.i++;return callFn(fn,args);
  }
  // range
  if(/^[A-J]\d+:[A-J]\d+$/i.test(t)){p.i++;return expandRange(t,stk);}
  // cell ref
  if(/^[A-J]\d+$/i.test(t)){
    p.i++;const k=t.toUpperCase();
    const res=evalCell(k,stk);
    if(res.err)throw new Error(res.err);
    if(res.val===''||res.val===undefined)return 0;
    if(typeof res.val==='string'){const n=Number(res.val);return isNaN(n)?0:n;}
    return res.val;
  }
  throw new Error('#ERR');
}

function expandRange(range,stk){
  const rng=parseRange(range);if(!rng)throw new Error('#REF');
  const[[r1,c1],[r2,c2]]=rng;const vals=[];
  for(let r=Math.min(r1,r2);r<=Math.max(r1,r2);r++)
    for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++){
      const res=evalCell(ckey(r,c),stk);
      if(res.err)throw new Error(res.err);
      if(res.val!==''&&res.val!==undefined)vals.push(typeof res.val==='number'?res.val:Number(res.val)||0);
    }
  return vals;
}

function callFn(fn,args){
  const flat=args.flat(Infinity).filter(v=>typeof v==='number'&&isFinite(v));
  switch(fn){
    case'SUM':return flat.reduce((a,b)=>a+b,0);
    case'AVERAGE':if(!flat.length)throw new Error('#DIV/0');return flat.reduce((a,b)=>a+b,0)/flat.length;
    case'MIN':if(!flat.length)throw new Error('#ERR');return Math.min(...flat);
    case'MAX':if(!flat.length)throw new Error('#ERR');return Math.max(...flat);
    case'COUNT':return flat.length;
    default:throw new Error('#NAME?');
  }
}

/* ─── compute + render ─── */
function recompute(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const k=ckey(r,c);const res=evalCell(k,null);
    computed[k]=res.err!==undefined?res.err:res.val;
  }
}

function fmtVal(v){
  if(typeof v==='number')return parseFloat(v.toPrecision(10)).toString();
  return v===undefined||v===''?'':String(v);
}

function renderCell(r,c){
  const sp=cells[r][c].querySelector('span');
  const v=computed[ckey(r,c)];
  if(v===undefined||v===''){sp.textContent='';sp.className='';return;}
  const isErr=typeof v==='string'&&v[0]==='#';
  sp.textContent=isErr?v:fmtVal(v);
  sp.className=isErr?'error':(typeof v==='number'?'num':'');
}

function renderAll(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)renderCell(r,c);}

/* ─── selection ─── */
const cellName=document.getElementById('cell-name');
const fbar=document.getElementById('formula-bar');

function select(r,c){
  r=Math.max(0,Math.min(ROWS-1,r));c=Math.max(0,Math.min(COLS-1,c));
  if(editing)commitEdit();
  cells[selR][selC].classList.remove('selected');
  selR=r;selC=c;
  cells[selR][selC].classList.add('selected');
  cellName.value=ckey(selR,selC);
  fbar.value=data[ckey(selR,selC)]||'';
}

/* ─── inline editing ─── */
function startEdit(init){
  if(editing)return;
  editing=true;
  const td=cells[selR][selC];
  editEl=document.createElement('input');
  editEl.type='text';editEl.className='edit';
  editEl.autocomplete='off';editEl.spellcheck=false;
  const raw=data[ckey(selR,selC)]||'';
  editEl.value=init!==undefined?init:raw;
  td.appendChild(editEl);editEl.focus();
  if(init!==undefined)editEl.setSelectionRange(editEl.value.length,editEl.value.length);
  else editEl.select();
  editEl.addEventListener('input',()=>fbar.value=editEl.value);
  editEl.addEventListener('keydown',editKey);
}

function commitEdit(){
  if(!editing)return;
  const k=ckey(selR,selC);
  data[k]=editEl.value;
  if(!data[k])delete data[k];
  finishEdit();
  recompute();renderAll();
  fbar.value=data[ckey(selR,selC)]||''; 
}

function cancelEdit(){
  if(!editing)return;
  finishEdit();
  fbar.value=data[ckey(selR,selC)]||'';
}

function finishEdit(){
  editing=false;
  if(editEl){const td=cells[selR][selC];if(editEl.parentNode===td)td.removeChild(editEl);editEl=null;}
}

function editKey(e){
  if(e.key==='Enter'){e.preventDefault();commitEdit();select(selR+1,selC);}
  else if(e.key==='Tab'){e.preventDefault();commitEdit();select(selR,selC+1);}
  else if(e.key==='Escape'){e.preventDefault();cancelEdit();}
}

/* ─── grid keydown ─── */
document.getElementById('grid-wrap').addEventListener('keydown',function(e){
  if(editing)return;
  if(e.key==='ArrowUp'){e.preventDefault();select(selR-1,selC);}
  else if(e.key==='ArrowDown'||e.key==='Enter'){e.preventDefault();select(selR+1,selC);}
  else if(e.key==='ArrowLeft'){e.preventDefault();select(selR,selC-1);}
  else if(e.key==='ArrowRight'||e.key==='Tab'){e.preventDefault();select(selR,selC+1);}
  else if(e.key==='Delete'||e.key==='Backspace'){
    delete data[ckey(selR,selC)];recompute();renderAll();fbar.value='';
  }
  else if(e.key==='F2'){startEdit();}
  else if(e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey){startEdit(e.key);}
});

/* ─── mouse ─── */
document.getElementById('grid').addEventListener('mousedown',function(e){
  const td=e.target.closest('td.cell');if(!td)return;
  const r=+td.dataset.r,c=+td.dataset.c;
  if(r===selR&&c===selC){if(!editing)startEdit();}
  else select(r,c);
});

/* ─── formula bar ─── */
fbar.addEventListener('focus',function(){
  if(!editing){
    editing=true;
    // use a sentinel so commitEdit knows to read from fbar
    editEl={value:fbar.value,_bar:true};
    cells[selR][selC].classList.add('selected');
  }
});
fbar.addEventListener('input',function(){if(editEl&&editEl._bar)editEl.value=fbar.value;});
fbar.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const k=ckey(selR,selC);
    if(editing&&editEl&&editEl._bar){data[k]=fbar.value;if(!data[k])delete data[k];editing=false;editEl=null;}
    recompute();renderAll();
    select(selR+1,selC);
    document.getElementById('grid-wrap').focus();
  } else if(e.key==='Escape'){
    e.preventDefault();
    if(editing&&editEl&&editEl._bar){editing=false;editEl=null;}
    fbar.value=data[ckey(selR,selC)]||'';
    fbar.blur();document.getElementById('grid-wrap').focus();
  }
});
fbar.addEventListener('blur',function(){
  if(editing&&editEl&&editEl._bar){
    // commit on blur
    const k=ckey(selR,selC);
    data[k]=fbar.value;if(!data[k])delete data[k];
    editing=false;editEl=null;
    recompute();renderAll();
  }
});

/* ─── CSV export ─── */
document.getElementById('export-btn').addEventListener('click',function(){
  let maxR=-1,maxC=-1;
  for(const k in data){if(!data[k])continue;const p=parseRef(k);if(p&&p[0]>maxR)maxR=p[0];if(p&&p[1]>maxC)maxC=p[1];}
  if(maxR<0){return;}
  const lines=[];
  for(let r=0;r<=maxR;r++){
    const row=[];
    for(let c=0;c<=maxC;c++){
      const v=computed[ckey(r,c)];
      let s=v===undefined||v===''?'':fmtVal(v);
      if(s.includes(','))s='"'+s.replace(/"/g,'""')+'"';
      row.push(s);
    }
    lines.push(row.join(','));
  }
  const blob=new Blob([lines.join('\r\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sheet.csv';a.click();
  URL.revokeObjectURL(a.href);
});

/* ─── init ─── */
recompute();
select(0,0);
document.getElementById('grid-wrap').focus();
})();
</script>
</body>
</html>
